<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <!-- ═══════════════════════════════════════════════════════════════
       keepioo Compact Lockup · Pretendard (토스 TDS 풍)
       사용처: Nav bar (58px 높이), footer, 이메일 헤더.
       헤더와 동일한 'keepi' + 'oo' 색 분리 + 부텍스트 정책알리미
       ═══════════════════════════════════════════════════════════════ -->

  <text x="0" y="32"
        font-family="'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="32" font-weight="800" letter-spacing="-1.2">
    <tspan fill="#191F28">keepi</tspan><tspan fill="#3182F6">oo</tspan>
  </text>

  <!-- 얇은 vertical divider -->
  <line x1="158" y1="14" x2="158" y2="34" stroke="#E5E8EB" stroke-width="1"/>

  <!-- 한글 부텍스트 -->
  <text x="170" y="30"
        font-family="'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="13" font-weight="600" fill="#8B95A1" letter-spacing="-0.2">정책알리미</text>
</svg>
