<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140">
  <!-- ═══════════════════════════════════════════════════════════════
       keepioo Primary Logo · Pretendard Wordmark (토스 TDS 풍)
       사용처: About 페이지, 이메일 서명, OG 이미지 기준, 포스터.
       흰 배경 + grey-900 본문 + blue-500 'oo' 강조.
       ═══════════════════════════════════════════════════════════════ -->

  <!-- 워드마크: keepi (잉크) + oo (토스 블루) -->
  <text x="280" y="92" text-anchor="middle"
        font-family="'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="88" font-weight="800" letter-spacing="-3.5">
    <tspan fill="#191F28">keepi</tspan><tspan fill="#3182F6">oo</tspan>
  </text>

  <!-- 한국어 부텍스트 (옅은 grey, 본문 위계) -->
  <text x="280" y="124" text-anchor="middle"
        font-family="'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="14" font-weight="600" fill="#8B95A1" letter-spacing="3">
    정책알리미
  </text>
</svg>
