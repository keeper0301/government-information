name: Big Cities Press Scraping (Playwright)

# SPA 시청 (창원·성남·안산·천안) 보도자료 scrape 후 keepioo /api/admin/import-press-batch POST.
# 정적 collector (lib/scraping/local-press/) 가 처리 못 하는 site 보완.
#
# secrets 필요:
#   KEEPIOO_API_URL  — 예 https://www.keepioo.com
#   KEEPIOO_API_KEY  — Vercel env IMPORT_PRESS_API_KEY 와 동일 값
#
# 일정: KST 10/16/22/4 (= UTC 1/7/13/19). 4회/일 × 4 시 = 매일 16 sub-run.

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run scraper
        env:
          KEEPIOO_API_URL: ${{ secrets.KEEPIOO_API_URL }}
          KEEPIOO_API_KEY: ${{ secrets.KEEPIOO_API_KEY }}
        run: node runner.mjs
