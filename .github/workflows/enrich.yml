name: 정책 상세 수집 (enrich)

# 03:00 UTC (한국 12:00) — 정책 상세 페이지 스크래핑
# idempotent — 이미 수집된 데이터는 덮어쓰기만 하므로 안전
# 2026-04-25: vercel.json 의 동일 cron 제거 → 본 yml 이 단일 trigger

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  enrich:
    name: keepioo.com enrich 엔드포인트 호출
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: enrich 엔드포인트 호출
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET 시크릿이 설정되지 않음."
            exit 1
          fi
          echo "== 요청 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S') =="
          http_status=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.keepioo.com/api/enrich")
          echo "== HTTP $http_status =="
          cat /tmp/response.json
          echo ""
          if [ "$http_status" -ne 200 ]; then
            echo "::error::enrich 호출 실패 (HTTP $http_status)"
            exit 1
          fi
