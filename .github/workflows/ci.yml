# PR 또는 master push 시 자동 검증 — vitest + tsc 만 실행.
# Vercel 이 prod build 를 자체 처리하므로 next build 는 의도적으로 제외 (시간·비용 절감).
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# read-only 만 필요 — supply chain 방어 (3rd party action 이 무단 push 못 하도록)
permissions:
  contents: read

jobs:
  test:
    name: vitest + tsc
    runs-on: ubuntu-latest
    # 정상 run 약 1~2분 (cache hit) — 5분이면 hang 방어 충분, 기존 workflow 와 통일
    timeout-minutes: 5
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node 20 설치 + npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치 (lockfile 기준)
        run: npm ci

      # 로컬 'npm run ci' 와 동일 명령 — drift 0
      - name: 로컬과 동일 검증 (tsc + vitest)
        run: npm run ci
