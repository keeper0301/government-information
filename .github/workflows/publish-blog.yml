name: 블로그 자동 발행 (매일)

# Vercel Hobby cron 의 ±59분 윈도우 + 배포 충돌 이슈를 피하기 위해
# GitHub Actions 로 이전. 분 단위 정확도 + 배포와 무관한 스케줄링.
#
# 동작: 매일 06:07 UTC (한국 15:07 부근) 에 keepioo.com 의 publish-blog 엔드포인트를
# Bearer 토큰 인증으로 호출. 매일 5글 발행 (step 분리로 60초 timeout 회피).
#
# 2026-04-24 복구: 커밋 76ff8ab 에서 폐기됐다가 옵션 C (품질 가드 추가) 로 복원.
# 2026-04-26 발행 빈도 증가: AdSense 검수 대비 자체 콘텐츠량 가속 (2글 → 3글).
# 2026-04-26 추가 가속: AdSense 거부 사유 1순위(콘텐츠 부족) 선제 대응 (3글 → 5글).
#   요일 카테고리 7개(일~토) 중 5개를 매일 순회. 같은 주에는 카테고리 중복 없음.
#   한 달 ~150글 페이스로 목표 도메인 신뢰도 가속.
# 2026-04-27 정시 회피: 0 6 → 7 6 (15:07 KST). GitHub 공식 best practice — 정시
#   트리거는 트래픽 몰림으로 지연/스킵 흔함 (GitHub schedule 은 best-effort).
#   2026-04-27 16:27 KST 기준 오늘 schedule run 이 아예 안 돌아 24h 결손 사고.
#   분 단위만 분산해 대기열 회피. 사장님 인지 시각 변화는 미미.
#
# 필요한 GitHub Secret:
#   CRON_SECRET — Vercel 환경변수와 동일한 값

on:
  schedule:
    # 06:07 UTC = 한국 15:07 부근. 정시(00분) 회피로 GitHub 트래픽 대기열 risk ↓
    - cron: "7 6 * * *"
  # Actions 탭에서 수동 실행 가능 (테스트·긴급 발행용)
  workflow_dispatch:

jobs:
  publish:
    name: keepioo.com 블로그 발행
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 핵심 설계: Vercel Hobby 의 60초 maxDuration 한도 때문에 하나의 HTTP 요청에서
    # count=2 병렬 실행하면 2번째 글이 timeout 에 걸려 504. 각 step 을 독립 호출로
    # 분리해서 각 step 이 자신만의 60초 윈도우를 사용하도록.
    # continue-on-error 로 1번째 실패해도 2번째 시도.

    steps:
      - name: 1번째 글 발행 (오늘 카테고리)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET 시크릿이 설정되지 않음."
            exit 1
          fi
          echo "== 요청 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S') =="
          http_status=$(curl -sS -o /tmp/response1.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.keepioo.com/api/publish-blog?count=1")
          echo "== HTTP $http_status =="
          cat /tmp/response1.json
          echo ""
          if [ "$http_status" -ne 200 ]; then
            echo "::warning::1번째 글 발행 실패 (HTTP $http_status) — 2번째 시도 계속"
            exit 1
          fi

      - name: 2번째 글 발행 (내일 카테고리, offset=1)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "== 요청 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S') =="
          http_status=$(curl -sS -o /tmp/response2.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.keepioo.com/api/publish-blog?count=1&offset=1")
          echo "== HTTP $http_status =="
          cat /tmp/response2.json
          echo ""
          if [ "$http_status" -ne 200 ]; then
            echo "::warning::2번째 글 발행 실패 (HTTP $http_status) — 3번째 시도 계속"
            exit 1
          fi

      - name: 3번째 글 발행 (모레 카테고리, offset=2)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "== 요청 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S') =="
          http_status=$(curl -sS -o /tmp/response3.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.keepioo.com/api/publish-blog?count=1&offset=2")
          echo "== HTTP $http_status =="
          cat /tmp/response3.json
          echo ""
          if [ "$http_status" -ne 200 ]; then
            echo "::warning::3번째 글 발행 실패 (HTTP $http_status) — 4번째 시도 계속"
            exit 1
          fi

      - name: 4번째 글 발행 (3일 후 카테고리, offset=3)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "== 요청 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S') =="
          http_status=$(curl -sS -o /tmp/response4.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.keepioo.com/api/publish-blog?count=1&offset=3")
          echo "== HTTP $http_status =="
          cat /tmp/response4.json
          echo ""
          if [ "$http_status" -ne 200 ]; then
            echo "::warning::4번째 글 발행 실패 (HTTP $http_status) — 5번째 시도 계속"
            exit 1
          fi

      - name: 5번째 글 발행 (4일 후 카테고리, offset=4)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          echo "== 요청 시각 (UTC): $(date -u '+%Y-%m-%d %H:%M:%S') =="
          http_status=$(curl -sS -o /tmp/response5.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://www.keepioo.com/api/publish-blog?count=1&offset=4")
          echo "== HTTP $http_status =="
          cat /tmp/response5.json
          echo ""
          if [ "$http_status" -ne 200 ]; then
            echo "::error::5번째 글 발행 실패 (HTTP $http_status)"
            exit 1
          fi
          echo "== 5개 step 완료 =="
