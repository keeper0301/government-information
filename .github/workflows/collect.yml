name: 정책 수집 (collect)

# 04:00 UTC (한국 13:00) — 15개 collector 병렬 실행
# Vercel Hobby 60초 maxDuration 제약 우회:
#   단일 호출로 15개 순차 실행하면 60초 초과 → matrix 로 병렬 분할 호출
# 각 source 별 독립된 Vercel 함수 호출 → 60초 여유 ✓

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  collect:
    name: collect [${{ matrix.source }}]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      # 하나 실패해도 나머지 계속 진행 (부분 수집 허용)
      fail-fast: false
      # Vercel serverless 동시 cold start 경쟁 방지 (15개 동시 호출 → timeout)
      # 3개씩 묶어 5 라운드로 순차화. 각 라운드 약 60~90초, 총 5~7분
      max-parallel: 3
      matrix:
        source:
          - bokjiro
          - local-welfare
          - youth-v2
          - mss
          - gov24
          - bizinfo
          - kstartup
          - smes
          - sbiz24
          - semas-policy-fund
          - koreg-haedream
          - nhis
          - employment
          - fsc
          - kinfa

    steps:
      - name: ${{ matrix.source }} 수집
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET 시크릿이 설정되지 않음."
            exit 1
          fi
          echo "== source=${{ matrix.source }} · $(date -u '+%Y-%m-%d %H:%M:%S') UTC =="

          # 최대 2회 시도 — Vercel 이 edge region 을 라운드 로빈으로 선택하므로
          # 첫 시도가 sfo1 (미국) 이라 60초 timeout 나도 재시도 시 icn1 (한국)
          # 갈 수 있음. sleep 20 으로 load balancer 가 region 바꿀 시간 확보.
          http_status=000
          for attempt in 1 2; do
            http_status=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
              --max-time 90 \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              "https://www.keepioo.com/api/collect?source=${{ matrix.source }}")
            echo "== attempt $attempt · HTTP $http_status =="
            cat /tmp/response.json
            echo ""
            if [ "$http_status" -eq 200 ]; then
              break
            fi
            if [ "$attempt" -lt 2 ]; then
              echo "== 재시도 대기 20초 =="
              sleep 20
            fi
          done

          if [ "$http_status" -ne 200 ]; then
            echo "::error::collect[${{ matrix.source }}] 실패 (HTTP $http_status, 2회 시도)"
            exit 1
          fi
