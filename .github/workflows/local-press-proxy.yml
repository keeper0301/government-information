name: Local Press Scraping (Playwright + icn1 프록시)

# JS 렌더형 시·군 보도자료를 풀 chromium 으로 읽어 keepioo /api/admin/import-press-batch POST.
# 정부 사이트가 해외(GitHub Actions 미국) IP 를 차단하므로, 정부 도메인 요청을 Vercel icn1
# (한국 IP) 프록시 /api/internal/icn1-fetch 로 우회시킨다 (KEEPIOO_USE_PROXY=1).
#
# 검증된 도시만 KEEPIOO_RUNNER_CITIES 로 점진 활성화 (현재 23). 도시 추가 시 ① 프록시
# allowlist(icn1-fetch) ② factory selector 검증 ③ 이 목록에 key 추가.
# (성동·동대문·성북: hwp/pdf 첨부 본문 → cities.mjs makeSiAttachScraper + _si_attach.mjs, @ohah/unpdf)
# (부산 북구는 2026-06-01 eminwon 으로 재이관 → 정적 _registry.ts bsbukgu-eminwon, 여기서 제외.)
#
# secrets 필요:
#   KEEPIOO_API_URL  — 예 https://www.keepioo.com (프록시 base + 배치 POST 대상)
#   KEEPIOO_API_KEY  — Vercel env IMPORT_PRESS_API_KEY 와 동일 값 (프록시 인증 + 배치 인증)
#
# 일정: KST 10/22 (= UTC 1/13). 2회/일.

on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch:
    inputs:
      cities:
        description: "테스트할 도시 key (쉼표 구분, 비우면 스케줄 기본값)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 23 도시(chromium + icn1 프록시 + hwp/PDF 첨부 다운로드)가 15분 초과 → 스케줄 run 이
    # 15분에 cancelled 되어 뒷순서 7개 도시(강남·성동·동대문·성북·제주·남동·의정부) 가끔 누락.
    # 셋업(npm+chromium) ~3분 + 도시당 ~45초 = 23도시 ~20분 → 30분 여유(2026-06-09 15→30).
    timeout-minutes: 30
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run scraper
        env:
          KEEPIOO_API_URL: ${{ secrets.KEEPIOO_API_URL }}
          KEEPIOO_API_KEY: ${{ secrets.KEEPIOO_API_KEY }}
          KEEPIOO_USE_PROXY: "1"
          # dispatch 시 입력값 우선, 스케줄 실행 시 기본값(검증 완료 도시)
          KEEPIOO_RUNNER_CITIES: ${{ github.event.inputs.cities || 'nowon,dongnae,busanjin,geumjeong,sasang,sasang_news,gimpo,seongnam,cheonan,ansan,changwon,yeongdo,suwon,pyeongtaek,yangcheon,eunpyeong,gangnam,seongdong,dongdaemun,seongbuk,jeju,namdong_incheon,uijeongbu,bucheon,siheung,gwangmyeong' }}
        run: node runner.mjs
