name: Agent learning digest

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

concurrency:
  group: agent-learning-digest
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  digest:
    name: Record daily agent learning memory
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Call agent-learning-digest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SITE_BASE_URL: https://www.keepioo.com
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not configured."
            exit 1
          fi

          echo "== agent learning digest $(date -u '+%Y-%m-%d %H:%M:%S') UTC =="
          http_status=$(curl -sS -o /tmp/agent-learning-digest-response.json -w "%{http_code}" \
            --request POST \
            --max-time 120 \
            --retry 2 \
            --retry-delay 10 \
            --retry-all-errors \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"source":"github_actions_daily_digest"}' \
            "${SITE_BASE_URL}/api/cron/agent-learning-digest")

          echo "== HTTP ${http_status} =="
          cat /tmp/agent-learning-digest-response.json
          echo ""

          if [ "${http_status}" -ne 200 ]; then
            echo "::error::agent-learning-digest failed (HTTP ${http_status})"
            exit 1
          fi

          node - <<'NODE'
          const fs = require("fs");
          const body = fs.readFileSync("/tmp/agent-learning-digest-response.json", "utf8");
          let json;
          try {
            json = JSON.parse(body);
          } catch {
            console.error("::error::agent-learning-digest did not return JSON.");
            process.exit(1);
          }
          if (json.ok !== true || !json.digest) {
            console.error("::error::agent-learning-digest returned JSON without ok=true digest.");
            process.exit(1);
          }
          console.log(`learning digest ok: health=${json.healthScore}`);
          const prReady = (json.recommendations || []).filter((item) => item.lane === "auto_pr");
          fs.writeFileSync("/tmp/agent-pr-ready-count", String(prReady.length));
          if (prReady.length > 0) {
            const lines = [
              "# Auto-ops PR-ready candidates",
              "",
              `Health score: ${json.healthScore}`,
              `Generated: ${json.digest.generatedAt}`,
              "",
              "These candidates repeated enough to leave the dashboard queue and enter the GitHub work queue.",
              "",
              ...prReady.slice(0, 10).flatMap((item, index) => [
                `## ${index + 1}. ${item.title}`,
                "",
                `- Area: ${item.area}`,
                `- Severity: ${item.severity}`,
                `- Occurrences: ${item.occurrences}`,
                `- Evidence: ${item.evidence || "-"}`,
                `- Suggested action: ${item.action || "-"}`,
                "",
              ]),
            ];
            fs.writeFileSync("/tmp/agent-pr-ready-issue.md", `${lines.join("\n")}\n`);
          }
          NODE

          pr_ready_count=$(cat /tmp/agent-pr-ready-count)
          if [ "${pr_ready_count}" -gt 0 ]; then
            issue_title="Auto-ops PR-ready candidates $(date -u '+%Y-%m-%d')"
            existing_count=$(gh issue list --state open --search "${issue_title} in:title" --json number --jq 'length')
            if [ "${existing_count}" -eq 0 ]; then
              gh issue create --title "${issue_title}" --body-file /tmp/agent-pr-ready-issue.md
            else
              echo "PR-ready issue already exists for today."
            fi
          else
            echo "No PR-ready candidates today."
          fi
