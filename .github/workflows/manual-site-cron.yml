name: Manual Site Cron Trigger

# 긴급 운영 복구용 수동 트리거.
# GitHub Actions secret CRON_SECRET 을 사용해 keepioo cron endpoint 를 호출한다.
# 임의 URL 호출을 막기 위해 endpoint 는 whitelist choice 로만 허용한다.
on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "호출할 안전 cron endpoint"
        required: true
        type: choice
        options:
          - press-ingest
          - press-legacy-cleanup
          - press-legacy-cleanup-dry
          - press-low-reminder
          - press-confidence-tune
          - alert-delivery-transient-cleanup
          - agent-resident-cycle
          - autonomous-improvement-scan
          - blog-quality-check-dry
          - blog-quality-check
          - external-console-check
          - adsense-gmail-watch
          - naver-extension-status
          - search-console-sitemap-submit
          - health-alert-dry
          - health-alert
          - scrape-local-press-pocheon-yeoju
          - news-classify
          - news-ai-commentary-backfill
          - user-contact-reminder-dry
          - user-contact-reminder
          - sns-publish-blog
          - sns-publish-popular-policy
          - sns-credential-check
          - sns-lead3-activate
          - instagram-publish-dry
          - instagram-publish
          - instagram-publish-now
          - instagram-insights-collect-dry
          - instagram-insights-collect
          - instagram-reels-publish-dry
          - instagram-reels-publish
          - instagram-reels-render-dry
          - instagram-reels-render
          - instagram-comment-drafts
      source:
        description: "감사 로그용 호출 출처"
        required: false
        default: "github_manual_site_cron"

permissions: {}

jobs:
  trigger:
    name: ${{ github.event.inputs.endpoint }} 호출
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Whitelist endpoint 선택
        id: endpoint
        env:
          ENDPOINT: ${{ github.event.inputs.endpoint }}
        run: |
          set -euo pipefail
          case "${ENDPOINT}" in
            press-ingest)
              path="/api/cron/press-ingest"
              method="POST"
              ;;
            press-legacy-cleanup)
              path="/api/cron/press-legacy-cleanup"
              method="POST"
              ;;
            press-legacy-cleanup-dry)
              path="/api/cron/press-legacy-cleanup?dry=1"
              method="POST"
              ;;
            press-low-reminder)
              path="/api/cron/press-low-reminder"
              method="GET"
              ;;
            press-confidence-tune)
              path="/api/cron/press-confidence-tune"
              method="POST"
              ;;
            alert-delivery-transient-cleanup)
              path="/api/cron/alert-delivery-transient-cleanup"
              method="POST"
              ;;
            agent-resident-cycle)
              path="/api/cron/agent-resident-cycle"
              method="POST"
              ;;
            autonomous-improvement-scan)
              path="/api/cron/autonomous-improvement-scan"
              method="POST"
              ;;
            blog-quality-check-dry)
              path="/api/cron/blog-quality-check?dry=1&log_safe=1"
              method="GET"
              ;;
            blog-quality-check)
              path="/api/cron/blog-quality-check"
              method="POST"
              ;;
            external-console-check)
              path="/api/cron/external-console-check"
              method="POST"
              ;;
            adsense-gmail-watch)
              path="/api/cron/adsense-gmail-watch"
              method="GET"
              ;;
            naver-extension-status)
              path="/api/cron/naver-extension-status"
              method="GET"
              ;;
            search-console-sitemap-submit)
              path="/api/cron/search-console-sitemap-submit"
              method="POST"
              ;;
            health-alert-dry)
              path="/api/cron/health-alert?dry=1&log_safe=1"
              method="GET"
              ;;
            health-alert)
              path="/api/cron/health-alert"
              method="GET"
              ;;
            scrape-local-press-pocheon-yeoju)
              path="/api/cron/scrape-local-press?cities=pocheon,yeoju"
              method="GET"
              ;;
            news-classify)
              path="/api/cron/news-classify"
              method="POST"
              ;;
            news-ai-commentary-backfill)
              path="/api/cron/news-ai-commentary-backfill"
              method="POST"
              ;;
            user-contact-reminder-dry)
              path="/api/cron/user-contact-reminder?dry=1&log_safe=1"
              method="GET"
              ;;
            user-contact-reminder)
              path="/api/cron/user-contact-reminder?log_safe=1"
              method="GET"
              ;;
            sns-publish-blog)
              path="/api/cron/sns-publish-blog"
              method="POST"
              ;;
            sns-publish-popular-policy)
              path="/api/cron/sns-publish-popular-policy"
              method="POST"
              ;;
            sns-credential-check)
              path="/api/cron/sns-credential-check"
              method="GET"
              ;;
            sns-lead3-activate)
              path="/api/cron/sns-lead-policy-apply?content=lead_3&status=active"
              method="POST"
              ;;
            instagram-publish-dry)
              path="/api/cron/instagram-publish?dry=1"
              method="GET"
              ;;
            instagram-publish)
              path="/api/cron/instagram-publish"
              method="GET"
              ;;
            instagram-publish-now)
              path="/api/cron/instagram-publish?force=1"
              method="GET"
              ;;
            instagram-insights-collect-dry)
              path="/api/cron/instagram-insights-collect?dry=1"
              method="GET"
              ;;
            instagram-insights-collect)
              path="/api/cron/instagram-insights-collect"
              method="GET"
              ;;
            instagram-reels-publish-dry)
              path="/api/cron/instagram-reels-publish?dry=1"
              method="GET"
              ;;
            instagram-reels-publish)
              path="/api/cron/instagram-reels-publish"
              method="GET"
              ;;
            instagram-reels-render-dry)
              path="/api/cron/instagram-reels-render?dry=1"
              method="GET"
              ;;
            instagram-reels-render)
              path="/api/cron/instagram-reels-render"
              method="GET"
              ;;
            instagram-comment-drafts)
              path="/api/cron/instagram-comment-drafts"
              method="POST"
              ;;
            *)
              echo "::error::허용되지 않은 endpoint: ${ENDPOINT}"
              exit 1
              ;;
          esac
          echo "path=${path}" >> "$GITHUB_OUTPUT"
          echo "method=${method}" >> "$GITHUB_OUTPUT"

      - name: Site cron 호출
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_BASE_URL: https://www.keepioo.com
          PATH_TO_CALL: ${{ steps.endpoint.outputs.path }}
          METHOD: ${{ steps.endpoint.outputs.method }}
          SOURCE: ${{ github.event.inputs.source }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET 비밀값이 설정되지 않았습니다."
            exit 1
          fi

          url="${SITE_BASE_URL}${PATH_TO_CALL}"
          body="{}"
          if [ "${PATH_TO_CALL}" = "/api/cron/agent-resident-cycle" ]; then
            body="{\"source\":\"${SOURCE}\"}"
          fi

          echo "== manual site cron =="
          echo "endpoint=${PATH_TO_CALL}"
          echo "method=${METHOD}"
          auth_scheme="Bearer"
          auth_header="Authorization: ${auth_scheme} "
          auth_header+="${CRON_SECRET}"
          curl_args=(
            -sS
            -o /tmp/response.json
            -w "%{http_code}"
            --request "${METHOD}"
            --max-time 420
            -H "${auth_header}"
            -H "Content-Type: application/json"
          )
          if [ "${METHOD}" != "GET" ]; then
            curl_args+=(--data "${body}")
          fi
          http_status=$(curl "${curl_args[@]}" "${url}")

          echo "HTTP ${http_status}"
          cat /tmp/response.json
          echo ""

          if [ "${http_status}" -lt 200 ] || [ "${http_status}" -ge 300 ]; then
            echo "::error::manual site cron 실패 — HTTP ${http_status}"
            exit 1
          fi
