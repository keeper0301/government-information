<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- iOS 홈스크린 아이콘 (Next.js 16 apple-icon convention)
       토스 TDS 풍 — blue-500 둥근 배경 + 흰색 'k' 워드마크 첫 글자 -->

  <rect width="180" height="180" rx="40" fill="#3182F6"/>

  <!-- 메인 'k' Pretendard 800 흰색 -->
  <text x="90" y="128" text-anchor="middle"
        font-family="'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="120" font-weight="800"
        fill="#FFFFFF" letter-spacing="-5">k</text>

  <!-- 하단 작은 한글 캡션 -->
  <text x="90" y="158" text-anchor="middle"
        font-family="'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif"
        font-size="11" font-weight="600" fill="#FFFFFF" opacity="0.8" letter-spacing="2">정책알리미</text>
</svg>
